<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'App Cascade</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Bloque strictement le défilement */
            background-color: #FAF3E3; 
            font-family: 'DIN Condensed', 'Arial Black', sans-serif;
            display: flex;
            justify-content: center;
        }

        /* Conteneur principal */
        .app-mobile-container {
            width: 100%;
            max-width: 430px; 
            height: 100dvh; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 3vh 0; 
            position: relative;
        }

        /* Haut de page */
        header {
            flex-shrink: 0; 
            height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .logo-app {
            height: 100%;
            width: auto;
            max-width: 240px;
            object-fit: contain;
        }

        /* Section au centre */
        .section-cascade {
            position: relative;
            flex-grow: 1; 
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 0; 
        }

        .fond-cascade {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Taille standard sans grossissement ni déformation */
            object-position: center; 
            z-index: 1;
        }

        .titre-attention {
            position: relative;
            z-index: 2;
            font-family: 'D-DIN Condensed', 'Arial Black', sans-serif;
            font-size: 30px; 
            font-weight: 900;
            color: white;
            letter-spacing: 1.5px;
            text-shadow: 
                /* Contour */
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                
                 /* Ombre portée */
                2px 2px 0px #000, 
                4px 4px 0px #000; 
                
            margin-top: 60px; 
        }

        .zone-dialogue {
            position: relative;
            z-index: 2;
            width: 100%;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 10px;
        }

        /* Bulle */
        .conteneur-bulle {
            position: relative;
            width: 220px;
            height: 90px;
            margin-left: 85px;
            margin-top: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 4;
        }

        .image-bulle-fond {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; 
            object-fit: fill; 
        }

        .texte-sur-bulle {
            position: relative;
            z-index: 2; 
            text-align: center;
            font-family: 'DIN Condensed', 'Arial Black', sans-serif;
            font-size: clamp(11px, 2vh, 14px);
            line-height: 1.3;
            color: #000;
            padding: 2px 15px 18px 15px; 
        }

        .souligne {
            text-decoration: underline;
        }

        .mascotte {
            position: absolute;
            left: 5%;
            bottom: -2vh; 
            height: 45%; 
            width: auto;
            max-width: 50%;
            object-fit: contain;
            transform-origin: bottom left;
            z-index: 5; /* Passe devant l'image et la bulle */
            margin-bottom: 100px;
            margin-left: -15px;
        }

        .btn-jaune {
            position: absolute;
            bottom: 0;
            transform: translateY(50%); 
            z-index: 6;
            background-color: #F8BC24; 
            color: black;
            text-decoration: none;
            font-weight: 900;
            font-size: clamp(13px, 2.2vh, 16px);
            text-align: center;
            line-height: 1.15;
            padding: 12px 20px;
            border: 3px solid black;
            border-radius: 40px;
            box-shadow: 0px 4px 0px 0px black;
            margin-bottom: 150px;
            margin-left: 80px;
        }

        .btn-jaune:active {
            transform: translateY(calc(50% + 2px));
            box-shadow: 0px 2px 0px 0px black;
        }

        /* Bas de page */
        footer {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            height: 12vh; 
            width: 100%;
        }

        .lien-continuer {
            color: black;
            font-size: clamp(10px, 1.8vh, 12px);
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-transform: uppercase;
            margin-bottom: 2vh;
            font-weight: bold;
        }

        .logo-departement {
            height: 4.5vh; 
            width: auto;
            max-width: 120px;
        }
    </style>
</head>
<body>

    <div class="app-mobile-container">
        <header>
            <img src="logo-app-cascade.png" alt="L'App Cascade" class="logo-app">
        </header>

        <main class="section-cascade">
            <img src="Fond.png" alt="Image de la cascade" class="fond-cascade">
            
            <h1 class="titre-attention">ATTENTION</h1>
            
            <div class="zone-dialogue">
                <div class="conteneur-bulle">
                    <img src="Bulle.png" alt="Bulle de dialogue" class="image-bulle-fond">
                    <div class="texte-sur-bulle">
                        Téléchargez l’application pour une<br>expérience optimale, sur ce site il n’y<br>a <span class="souligne">pas de réseau</span> !
                    </div>
                </div>
                
                <img src="Mascotte.png" alt="Mascotte guide" class="mascotte">
            </div>

            <a href="#" class="btn-jaune">
                TÉLÉCHARGER<br>LES DONNÉES
            </a>
        </main>

        <footer>
            <a href="#" class="lien-continuer">CONTINUER SANS TÉLÉCHARGER</a>
            <img src="logo-departement-var.png" alt="Logo département du Var" class="logo-departement">
        </footer>
    </div>

</body>
</html>
