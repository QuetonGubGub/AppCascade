<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="pictoFA.js" crossorigin="anonymous"></script>
    <link href="css/style.css" rel="stylesheet">
    <title>Se préparer</title>
</head>
<body>
        <!-- Section En-tête -->
    <header>
        <div id="headerContent">
            <button class="nbShadow btnCircl btnCirclColor_ylw"><a href="mode-visite.html"><img src="../testStyle/img/back-btn.png"></a></button>
            <h2 id="titre2-preparer">PREPARER MA VISITE</h2>
            <h1>LES ÉQUIPEMENTS À AVOIR</h1>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue">
                <img src="img/general/vagueVerte.svg" id="waveGreen">
            </div>
        </div>
    </header>
    
        <!-- Section corps -->
    <main>
        <!-- La liste de comment se préparer -->
        <section id="comment-preparer">
            <div id="mascotte-equipement">
                <img class="img-mascotte" src="img/mascotte/mascotte-defaut.png">
            </div>
            <div id="liste-equipements">
                <div class="check-equipement">
                    <div class="equipement">
                        <h4 class="nom-equipement">Chaussures de randonnée</h4>
                        <p class="description-equipement">Il y a des sentiers, du dénivelé et beaucoup de marhce à monter et descednre, ça serait bête de se fouler une cheville !</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- La mascotte qui conseille -->
        <section id="eviter-preparer">
            <img class="img-mascotte" src="img/mascotte/mascotte-parle.png">
        </section>
        <div id="boutons-preparer">
            <button class="nbShadow btnSqr btnSqrColor_blue"><a href="consignes.html"><i class="fa-solid fa-triangle-exclamation"></i> CONSIGNES</a></button>
            <button class="nbShadow btnSqr btnSqrColor_blue"><a href="infos-pratiques.html"><i class="fa-solid fa-circle-info"></i> INFOS PRATIQUES</a></button>
        </div>
    </main>
</body>
</html>
