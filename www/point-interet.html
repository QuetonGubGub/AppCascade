<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/point-interet.css">
    <title>Point d'intérêt</title>
</head>
<body>
            <!-- Section En-tête -->
    <header>
        <div id="headerContent">
            <button class="nbShadow btnCircl btnCirclColor_ylw"><a id="lien-point" href="#"><img src="img/general/back-btn.png"></a></button>
            <h1 id="nom-interet">NOM</h1>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue">
                <img src="img/general/vagueVerte.svg" id="waveGreen">
            </div>
        </div>
    </header>
    <body>
        <img id="image-interet" src="#">
        <div class="block-interet">
            <p id="description-interet" class="textBlock"></p><br>
            <p id="consulter-interet">Prochain point d’intérêt : <span id="prochain-point">PROCHAIN</span></p>
            <button id="plus" class="btnSqrColor_blue"><a id="lien-video" href="#"><i class="fa-solid fa-circle-play"></i></a></button>
        </div>
    </body>

<script src="point-interet.js"></script>
<script src="pictoFA.js"></script>

<script>
    if ('serviceWorker' in navigator) {
        // Le fichier sw.js est bien dans le même dossier 'www' que carte.html
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker enregistré avec succès"))
            .catch((err) => console.error("Erreur d'enregistrement :", err));
    }
</script>
    
</body>
</html>
