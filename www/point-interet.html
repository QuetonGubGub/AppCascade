<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="img/general/favicon-cascade.png" rel="icon">
    <link href="css/style.css" rel="stylesheet">
    <link rel="stylesheet" href="css/point-interet.css">
    <title>Point d'intérêt</title>
</head>
<body>
    <!-- Section En-tête -->
    <header>
        <div id="headerContent">
            <button id="lien-point" class="nbShadow btnCircl btnCirclColor_ylw"><img src="img/general/back-btn.png" alt="Bouton de retour"></button>
            <h1 id="nom-interet">NOM</h1>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue" alt="Motif vague bleue">
                <img src="img/general/vagueVerte.svg" id="waveGreen" alt="Motif vague verte">
            </div>
        </div>
    </header>
    <!-- Section Principale comportant toutes les informations sur le point d'intérêt, elles sont transmises via le JavaScript -->
    <main>
        <img id="image-interet" src="#" alt="Image de fond du point d'intérêt">
        <div class="block-interet">
            <p id="description-interet" class="textBlock"></p><br>
            <p id="consulter-interet">Prochain point d’intérêt : <span id="prochain-point">PROCHAIN</span></p>
            <a id="lien-video" class="btnSqrColor_blue nbShadow" href="#"><i class="fa-solid fa-circle-play"></i></a>
        </div>
    </main>

<script src="point-interet.js" defer></script>
<script src="pictoFA.js"></script>

<!-- Vérification de la fonctionnalité de navigation en JavaScript -->
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker enregistré avec succès"))
            .catch((err) => console.error("Erreur d'enregistrement :", err));
    }
</script>
    
</body>
</html>
