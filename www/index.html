<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'App Cascade</title>
    <link rel="stylesheet" href="css/telechargement.css">
</head>

<body class="app-mobile-container">

    <header>
        <img src="img/general/logo-app-cascade.png" alt="L'App Cascade" class="logo-app">
    </header>

    <main class="section-cascade">
        <img src="img/general/Fond.png" alt="Image de la cascade" class="fond-cascade">
        
        <h1 class="titre-attention">ATTENTION</h1>
        
        <div class="zone-dialogue">
            <div class="conteneur-bulle">
                <img src="img/general/Bulle.png" alt="Ligne de dialogue" class="image-bulle-fond">
                <div class="texte-sur-bulle" id="status-text">
                    Téléchargez l’application pour une<br>expérience optimale, sur ce site il n’y a pas de réseau !
                </div>
            </div>
            <img src="img/mascotte/mascotte-question-2.png" alt="Mascotte guide" class="mascotte">
        </div>

        <button id="btn-dl" class="btn-jaune" style="border:none; cursor:pointer; font:inherit;">
            TÉLÉCHARGER<br>LES DONNÉES
        </button>
    </main>

    <footer>
        <a href="accueil.html" class="lien-continuer">CONTINUER SANS TELECHARGER</a>
        <img src="img/general/logo-departement-var.png" alt="Logo département du Var" class="logo-departement">
    </footer>

    <script>
        // On attache l'événement au chargement du DOM pour éviter les erreurs d'appel
        document.getElementById('btn-dl').addEventListener('click', async () => {
            const btn = document.getElementById('btn-dl');
            const status = document.getElementById('status-text');
            
            btn.disabled = true;
            btn.innerText = "Téléchargement en cours...";
            
            const filesToCache = [
                'index.html', 'telechargement.html', 'carte.html',
                'css/style_carte.css', 'css/telechargement.css',
                'lieu_1.html', 'lieu_2.html', 'lieu_3.html', 
                'lieu_4.html', 'lieu_5.html', 'lieu_6.html',
                'img/general/IMAGE_OFFICE.jpg', 'img/general/IMAGE_CHAMP.jpg', 
                'img/general/IMAGE_PANORAMA.png', 'img/general/IMAGE_CASCADE.jpg', 
                'img/general/IMAGE_ECOLE_GARE.png', 'img/general/IMAGE_VILLAGE.jpg'
            ];

            try {
                // 1. Enregistrement du Service Worker
                if ('serviceWorker' in navigator) {
                    await navigator.serviceWorker.register('sw.js');
                }

                // 2. Mise en cache
                const cache = await caches.open('app-cascade-v5');
                await cache.addAll(filesToCache).catch(err => {
                    console.warn("Certains fichiers n'ont pas pu être ajoutés :", err);
                });

                // 3. Redirection
                localStorage.setItem('data_downloaded', 'true');
                window.location.href = 'carte.html';
            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerHTML = "TÉLÉCHARGER<br>LES DONNÉES";
            }
        });
    </script>
</body>
</html>
