<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'App Cascade</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Section En-tête (Logo) -->
    <header>
        <img src="img/general/logo-departement-var.png" alt="L'App Cascade">
    </header>

    <!-- Section Principale (Contenu avec image de fond) -->
    <main>
        <section>
            <h1>ATTENTION</h1>
            
            <!-- Mascotte qui parle -->
            <div class="groupe-accueil">
                <img src="img/general/fond-cascade.png" alt="Image de la cascade">
                <img src="img/mascotte/mascotte-question-1.png" alt="Mascotte guide">
                <blockquote>
                    Téléchargez l’application pour une expérience optimale, 
                    sur ce site il n’y a <strong>pas de réseau</strong> !
                </blockquote>
            </div>

            <!-- Bouton d'action principal -->
            <div class="telecharger-donnees">
                <a href="#" role="button">TÉLÉCHARGER LES DONNÉES</a>
            </div>
        </section>
    </main>

    <!-- Section Bas de page (Liens et Footer) -->
    <footer>
        <div class="sans-telecharger">
            <a href="#">CONTINUER SANS TELECHARGER</a>
        </div>
        
        <div class="logo-departement">
            <img src="img/general/logo-departement-var.png" alt="Logo département du Var">
        </div>
    </footer>

</body>
</html>
