<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L'App Cascade</title>
    <link rel="stylesheet" href="css/telechargement.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-mobile-container">
    <header>
        <img src="img/general/logo-app-cascade.png" alt="L'App Cascade" class="logo-app">
    </header>

    <main class="section-cascade">
        <img src="img/general/Fond.png" alt="Image de la cascade" class="fond-cascade">
        <h1 class="titre-attention">ATTENTION</h1>
        <div class="zone-dialogue">
            <div class="conteneur-bulle">
                <div class="texte-sur-bulle" id="status-text">
                    Téléchargez l’application pour une expérience optimale, sur ce site il n’y a pas de réseau !
                </div>
                <img id="bulle-blanche" src="img/general/bulle-blanche.svg">
            </div>
            <img src="img/mascotte/Mascotte_Question_O.png" alt="Mascotte guide" id="mascotte-telechargement" class="img-invert">
        </div>
        <button id="btn-dl" class="btn-jaune" style="border:none; cursor:pointer;">
            TÉLÉCHARGER<br>LES DONNÉES
        </button>
    </main>

    <footer>
        <a href="accueil.html" class="lien-continuer">CONTINUER SANS TELECHARGER</a>
        <img src="img/general/logo-departement-var.png" alt="Logo département du Var" class="logo-departement">
    </footer>

    <script>
        document.getElementById('btn-dl').addEventListener('click', async () => {
            const status = document.getElementById('status-text');
            const btn = document.getElementById('btn-dl');
            
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.5';
            
            const isLocal = window.location.protocol === 'file:';

            if (isLocal) {
                // SIMULATION POUR LE LOCAL
                status.innerHTML = "Mode local.<br>Simulation...";
                let progress = 0;
                const fakeDownload = setInterval(() => {
                    progress += 20;
                    status.innerHTML = `Téléchargement en cours...<br><b>${progress}%</b>`;
                    if (progress >= 100) {
                        clearInterval(fakeDownload);
                        status.innerHTML = "Redirection...";
                        localStorage.setItem('data_downloaded', 'true');
                        setTimeout(() => { window.location.href = 'accueil.html'; }, 1000);
                    }
                }, 300);

            } else {
                // VRAI TÉLÉCHARGEMENT HÉBERGÉ
                status.innerHTML = "Préparation du téléchargement...";

                const filesToCache = [
                    './',
                    'index.html',
                    'point-interet.html',
                    'point-interet.html?nom=office-tourisme',
                    'point-interet.html?nom=champ',
                    'point-interet.html?nom=panorama',
                    'point-interet.html?nom=cascade',
                    'point-interet.html?nom=ecole',
                    'point-interet.html?nom=village',
                    'accueil.html',
                    'carte.html',
                    'remerciements.html',
                    'bibliotheque.html',
                    'bibliotheque-animal.html',
                    'bibliotheque-famille.html',
                    'confidentialite.html',
                    'mentions-legales.html',
                    'consignes.html',
                    'infos-pratiques.html',
                    'preparation.html',
                    'quizz.html',
                    'video.html',
                    'css/telechargement.css',
                    'css/carte.css',
                    'css/accueil.css',
                    'img/general/logo-app-cascade.png',
                    'img/general/Fond.png',
                    'img/general/bulle.svg',
                    'img/general/vagueBleu.svg',
                    'img/general/back-btn.png',
                    'img/general/book-solid-full.svg',
                    'img/general/flag-solid-full.svg',
                    'img/general/back-btn.png',
                    'img/general/book-solid-full.svg',
                    'img/general/vagueBleu.svg',
                    'img/general/vagueBleuBas.svg',
                    'img/general/vagueCyanBas.svg',
                    'img/general/vagueVerte.svg',
                    'img/general/IMAGE_CASCADE.jpg',
                    'img/general/IMAGE_VILLAGE.jpg',
                    'img/general/IMAGE_CHAMP.jpg',
                    'img/general/IMAGE_OFFICE.jpg',
                    'img/general/IMAGE_ECOLE_GARE.png',
                    'img/general/IMAGE_PANORAMA.png',

                ];

                let erreurs = [];

                try {
                    const cache = await caches.open('cascade-v1');
                    let loaded = 0;
                    const total = filesToCache.length;

                    for (const file of filesToCache) {
                        try {
                            const request = new Request(file, { mode: file.startsWith('http') ? 'cors' : 'no-cors' });
                            const response = await fetch(request);
                            
                            if (response.ok || response.type === 'opaque') {
                                await cache.put(request, response);
                            } else {
                                erreurs.push(file); // On mémorise le fichier qui a planté
                            }
                        } catch (fetchErr) {
                            erreurs.push(file); // On mémorise le fichier introuvable
                        }
                        loaded++;
                        const percentage = Math.round((loaded / total) * 100);
                        status.innerHTML = `Téléchargement en cours...<br><b>${percentage}%</b>`;
                    }

                    // SI DES FICHIERS ONT PLANTÉ, ON LES AFFICHE
                    if (erreurs.length > 0) {
                        console.error("Fichiers introuvables :", erreurs);
                        status.innerHTML = `<b>Erreur sur ces fichiers :</b><br> ${erreurs.slice(0, 2).join(', ')}...<br>Vérifiez les majuscules !`;
                        btn.style.pointerEvents = 'auto';
                        btn.style.opacity = '1';
                        return; // On stoppe tout
                    }

                    status.innerHTML = "Installation du mode hors-ligne...";

                    if ('serviceWorker' in navigator) {
                        await navigator.serviceWorker.register('sw.js');
                    }

                    status.innerHTML = "Données prêtes ! Redirection...";
                    localStorage.setItem('data_downloaded', 'true');
                    setTimeout(() => { window.location.href = 'accueil.html'; }, 1000);

                } catch (err) {
                    status.innerHTML = `Impossible de créer le cache. Erreur : ${err.message}`;
                    btn.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                }
            }
        });
    </script>

</body>
</html>
