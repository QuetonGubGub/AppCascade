<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="img/general/favicon-cascade.png" rel="icon">
    <title>L'App Cascade - Inventaire de la faune</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bibliotheque.css">
</head>
<body>

        <!-- Section En-tête -->
    <header>
        <div id="headerContent">
            <button onclick="history.back()" class="nbShadow btnCircl btnCirclColor_ylw"><img src="img/general/back-btn.png" alt="Bouton de retour"></button>
            <h1 id="nom-espece-animale">Nom de l'animal</h1>
            <img id="image-espece-animale" class="image-principale-animale" src="#" alt="Image de profil de l'animal">
        <div id="liste-rouge-couleur">
            <p id="liste-rouge"></p>
        </div>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue" alt="Motif vague bleue">
                <img src="img/general/vagueVerte.svg" id="waveGreen" alt="Motif vague verte">
            </div>
        </div>
    </header>

        <!-- Informations sur l'animal -->
    <div id="bloc-text">
        <div>
            <h2>Peut vivre jusqu'à <span id="esperance-vie"></span> ans</h2>
            <h2>Régime alimentaire : <span id="regime-alimentaire"></span></h2>
        </div>
        <p id="description-espece-animale"></p>
    </div>

        <!-- Carousel -->
    <div id="gallery">
        <div class="gallery-container">
            <button class="prev"><img alt="bouton de carousel gauche" src="img/bibliotheque/carousel-fleche-g.png"></button>
            <div id="galleryTrack"></div>
            <button class="next"><img alt="bouton de carousel droit" src="img/bibliotheque/carousel-fleche-d.png"></button>
        </div>
    </div>
        <!-- Permet le zoom sur les images -->
        <div id="lightbox">
        <img id="lightboxImg" src="#" alt="Image Zoomée">
    </div>
    <h3 id="vu">L'avez-vous vu ?</h3>
<script src="bibliotheque-sources-animaux.js"></script>
</body>
</html>
