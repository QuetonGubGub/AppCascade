<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'App Cascade - Bibliothèque</title>
    <link rel="stylesheet" href="../testStyle/style.css">
</head>
<body>
    <div id="nom-image-animal">
        <h2 id="nom-espece-animale"></h2>
        <img id="image-espece-animale" src="#" alt="Image de profil de l'animal">
        <div id="liste-rouge-couleur">
            <p id="liste-rouge"></p>
        </div>
    </div>
    <div id="bloc-text">
        <div>
            <h4>Peut vivre environ <span id="esperance-vie"></span> ans</h4>
            <h4>Régime alimentaire : <span id="regime-alimentaire"></span></h4>
        </div>
        <p id="description-espece-animale"></p>
    </div>
    <div id="carrousel-espece-animale">
        <button id="btn-carrousel-gauche"></button>
        <div id="images-carrousel"></div>
        <button id="btn-carrousel-droit"></button>
    </div>
    <h3>L'avez-vous vu ?</h3>
</body>
<script src="bibliotheque-sources-animaux.js"></script>
</html>
