<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="img/general/favicon-cascade.png" rel="icon">
    <title>L'App Cascade - Inventaire de la faune</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bibliotheque.css">
    <script src="traduction.js"></script>
    <script src="lang.js"></script>
</head>
<body>

    <!-- Section En-tête -->
    <header>
        <div id="headerContent">
                       <button onclick="history.back()" class="nbShadow btnCircl btnCirclColor_ylw"><img src="img/general/back-btn.png" alt="Bouton de retour"></button>
            <h1 contenuTXT="titre">BIBLIOTHEQUE <br> DE LA FAUNE</h1>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue" alt="Motif vague bleue">
                <img src="img/general/vagueVerte.svg" id="waveGreen" alt="Motif vague verte">
            </div>
        </div>
    </header>
    
    <!-- Main avec toutes les deux familles des animaux présents sur le site-->
    <main>
        <section id="bibliotheque-famille">
            <a class="famille-animal nbShadow" href="bibliotheque-famille.html?id=mammifere">
                <div class="images-famille">
                    <img src="img/bibliotheque/mammifere.png" alt="Miniature mammifères">
                </div>
                <h2 contenuTXT="indique_mamiferes">Mammifères</h2>
            </a>
            <a class="famille-animal nbShadow" href="bibliotheque-famille.html?id=oiseau">
                <div class="images-famille">
                    <img src="img/bibliotheque/oiseau.png" alt="Miniature oiseaux">
                </div>
                <h2 contenuTXT="indique_oiseaux">Oiseaux</h2>
            </a>
        </section>
    </main>
</body>
</html>
