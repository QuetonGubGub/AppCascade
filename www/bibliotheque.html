<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'App Cascade - Bibliothèque</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Section En-tête -->
    <header>
        <div id="headerContent">
            <button class="nbShadow btnCircl btnCirclColor_ylw"><a href="mode-visite.html"><img src="../testStyle/img/back-btn.png"></a></button>
            <h1>BIBLIOTHEQUE</h1>
            <div id="headerBackground">
                <img src="img/general/vagueBleu.svg" id="waveBlue">
                <img src="img/general/vagueVerte.svg" id="waveGreen">
            </div>
        </div>
    </header>
    
    <!-- Main avec toutes les familles des animaux -->
    <main>
        <section id="bibliotheque-famille">
            <button class="famille-animal nbShadow">
                <a href="bibliotheque-famille.html?id=mammifere">
                <div class="div-image-animal"><img src="img/bibliotheque/icone-mammifere.png" alt="Icône mammifère" class="famille-animal-img"></div>
                <h3>Mammifières</h3>
                </a>
            </button>
            <button class="famille-animal nbShadow">
                <a href="bibliotheque-famille.html?id=oiseau">
                <div class="div-image-animal"><img src="img/bibliotheque/icone-oiseau.png" alt="Icône oiseau" class="famille-animal-img"></div>
                <h3>Oiseaux</h3>
                </a>
            </button>
        </section>
    </main>
</body>
</html>
